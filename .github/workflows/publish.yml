name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is missing. Add an org or repo secret and grant this repository access."
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ -n "$RELEASE_TAG" ] && [ "$PACKAGE_VERSION" != "${RELEASE_TAG#v}" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION"
            exit 1
          fi
          if npm view "keylab@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "::error::keylab@$PACKAGE_VERSION is already published"
            exit 1
          fi

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
